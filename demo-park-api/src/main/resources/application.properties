spring.application.name=demo-park-api

#locale
spring.web.locale-resolver=fixed
spring.web.locale=pt_BR

# Database Configuration (H2 for demo)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Caminho do Swagger UI
springdoc.swagger-ui.path=/docs-park.html

# Caminho da API Docs (o JSON do OpenAPI)
springdoc.api-docs.path=/docs-park

# Pacotes a serem escaneados
springdoc.packages-to-scan=com.allanaoliveira.demo_park_api.web.controller
